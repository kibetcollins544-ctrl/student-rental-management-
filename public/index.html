<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RentEase — Student Rental Management</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">🏠</div>
      <h1>RentEase</h1>
      <p class="login-sub">Student Rental Management System</p>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="admin@rental.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <div id="login-error" class="error-msg hidden"></div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app hidden">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">🏠 <span>RentEase</span></div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard">📊 Dashboard</a>
        <a href="#" class="nav-item" data-page="properties">🏢 Properties</a>
        <a href="#" class="nav-item" data-page="students">👥 Students</a>
        <a href="#" class="nav-item" data-page="invoices">📄 Invoices</a>
        <a href="#" class="nav-item" data-page="payments">💳 Payments</a>
        <a href="#" class="nav-item" data-page="utilities">⚡ Utilities</a>
        <a href="#" class="nav-item landlord-only" data-page="admins">👤 Admins</a>
      </nav>
      <div class="sidebar-footer">
        <span id="admin-name-sidebar"></span>
        <button id="logout-btn" class="btn btn-ghost btn-sm">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <h2 id="page-title">Dashboard</h2>
        <div class="topbar-right">
          <span id="current-month-display"></span>
          <span class="admin-badge" id="admin-role-badge"></span>
        </div>
      </header>

      <!-- Pages -->
      <div id="page-dashboard" class="page active"></div>
      <div id="page-properties" class="page hidden"></div>
      <div id="page-students" class="page hidden"></div>
      <div id="page-invoices" class="page hidden"></div>
      <div id="page-payments" class="page hidden"></div>
      <div id="page-utilities" class="page hidden"></div>
      <div id="page-admins" class="page hidden"></div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button id="modal-close" class="btn-icon">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/properties.js"></script>
  <script src="js/students.js"></script>
  <script src="js/invoices.js"></script>
  <script src="js/payments.js"></script>
  <script src="js/utilities.js"></script>
  <script src="js/admins.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
